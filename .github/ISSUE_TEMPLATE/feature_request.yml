name: Feature request
description: Propose an improvement to Sketch.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Sketch do instead?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Links, screenshots, example machines, or related tools.
